<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>歷史線 — 中國 × 台灣 × 韓國 (1895–2026)</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "PingFang TC", "Microsoft JhengHei", "Noto Sans TC", sans-serif;
    background: #f5f2ec;
    color: #2b2b2b;
  }
  header {
    padding: 18px 28px 10px;
    background: #1f1f1f;
    color: #f5f2ec;
    border-bottom: 3px solid #c9a24a;
  }
  header h1 { margin: 0 0 4px; font-size: 22px; letter-spacing: 2px; }
  header p  { margin: 0; font-size: 13px; color: #cfcabd; }

  /* 圖例 */
  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 14px 22px;
    padding: 12px 28px;
    background: #ece7db;
    border-bottom: 1px solid #d7cfbd;
    font-size: 13px;
  }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .swatch { width: 16px; height: 12px; border-radius: 2px; border: 1px solid rgba(0,0,0,.15); }

  /* 時間軸容器 */
  .timeline-wrapper {
    overflow-x: auto;
    overflow-y: hidden;
    padding: 0 0 24px;
    background: #f5f2ec;
  }
  .timeline {
    position: relative;
    /* 寬度由 JS 動態設定 */
  }

  /* 國家標籤欄 */
  .country-label {
    position: absolute;
    left: 0;
    width: 130px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 3px;
    color: #f5f2ec;
    border-right: 3px solid #c9a24a;
    z-index: 3;
    /* top / height 由 JS 設定 */
  }

  /* 刻度軸 */
  .axis {
    position: relative;
    height: 60px;
    border-bottom: 2px solid #2b2b2b;
    margin-bottom: 0;
  }
  .tick { position: absolute; bottom: 0; width: 1px; background: #888; }
  .tick.minor { height: 8px; background: #b7b1a2; }
  .tick.major { height: 22px; width: 2px; background: #2b2b2b; }
  .tick-label {
    position: absolute;
    bottom: 26px;
    transform: translateX(-50%);
    font-size: 12px;
    font-weight: 700;
    color: #2b2b2b;
    white-space: nowrap;
  }

  /* 通道 */
  .lane {
    position: relative;
    border-bottom: 1px solid #c4bda9;
    /* height 由 JS 動態設定 */
  }
  .lane .gridline {
    position: absolute;
    top: 0; bottom: 0;
    width: 1px;
    background: rgba(180,170,145,.35);
  }
  .lane .gridline.major { background: rgba(80,70,50,.25); }

  /* 朝鮮半島通道：1948 後加底紋表示結束 */
  .lane-kr {
    border-left: 4px solid rgba(122,106,58,0.4);
  }
  .lane-kr .kr-ended {
    position: absolute;
    top: 0; bottom: 0;
    background: repeating-linear-gradient(
      135deg,
      rgba(180,170,145,.12) 0px,
      rgba(180,170,145,.12) 4px,
      transparent 4px,
      transparent 10px
    );
    border-left: 2px dashed rgba(122,106,58,0.4);
    z-index: 0;
  }
  .split-marker {
    position: absolute;
    top: 0; bottom: 0;
    width: 2px;
    background: rgba(122,106,58,0.6);
    z-index: 2;
  }
  .split-label {
    position: absolute;
    top: 4px;
    left: 4px;
    font-size: 10px;
    color: rgba(100,85,40,0.85);
    white-space: nowrap;
    font-weight: 600;
    letter-spacing: 0.5px;
  }

  /* 南韓 / 北韓通道 */
  .lane-sk { border-left: 4px solid rgba(26,74,138,0.35); border-bottom: 2px dashed rgba(120,80,80,.4); }
  .lane-nk { border-left: 4px solid rgba(139,26,26,0.35); }

  /* 事件條 */
  .event {
    position: absolute;
    height: 26px;
    border-radius: 4px;
    padding: 3px 6px;
    color: #fff;
    font-size: 12px;
    line-height: 20px;
    overflow: visible;
    min-width: 28px;
    cursor: pointer;
    box-shadow: 0 1px 2px rgba(0,0,0,.12);
    border: 1px solid rgba(0,0,0,.15);
    transition: transform .12s, box-shadow .12s;
    z-index: 1;
  }
  .event:hover {
    transform: translateY(-1px);
    box-shadow: 0 4px 10px rgba(0,0,0,.22);
    z-index: 10;
  }
  .event-text {
    display: block;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    line-height: 20px;
  }

  /* Tooltip（hover 顯示 descBrief） */
  .tooltip {
    display: none;
    position: absolute;
    left: 0;
    top: 32px;
    background: #1f1f1f;
    color: #f5f2ec;
    padding: 8px 12px;
    border-radius: 4px;
    font-size: 12px;
    line-height: 1.6;
    white-space: normal;
    width: 280px;
    z-index: 20;
    box-shadow: 0 6px 16px rgba(0,0,0,.3);
    pointer-events: none;
  }
  .event:hover .tooltip { display: block; }
  .tooltip-title { font-weight: 700; font-size: 13px; margin-bottom: 2px; }
  .tooltip-range { color: #c9a24a; font-size: 11px; margin-bottom: 5px; }
  .tooltip-desc  { color: #e0dbd0; }

  .detail-panel {
    position: fixed;
    top: 0; right: -400px;
    width: 380px;
    height: 100vh;
    background: #fff;
    box-shadow: -4px 0 20px rgba(0,0,0,.15);
    z-index: 100;
    transition: right .25s ease;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .detail-panel.open { right: 0; }
  .detail-panel-header {
    padding: 20px 20px 14px;
    background: #1f1f1f;
    color: #f5f2ec;
    flex-shrink: 0;
  }
  .detail-panel-header h2 { margin: 0 0 4px; font-size: 16px; line-height: 1.4; }
  .detail-panel-range { color: #c9a24a; font-size: 12px; }
  .detail-panel-close {
    position: absolute;
    top: 16px; right: 16px;
    background: none;
    border: none;
    color: #f5f2ec;
    font-size: 20px;
    cursor: pointer;
    line-height: 1;
    padding: 4px;
  }
  .detail-panel-body {
    padding: 20px;
    overflow-y: auto;
    flex: 1;
    font-size: 14px;
    line-height: 1.7;
    color: #333;
  }
  .detail-brief {
    background: #f5f2ec;
    border-left: 3px solid #c9a24a;
    padding: 10px 14px;
    margin-bottom: 16px;
    font-size: 13px;
    color: #555;
    border-radius: 0 4px 4px 0;
  }
  .detail-load-btn {
    display: block;
    width: 100%;
    padding: 10px;
    background: #2b2b2b;
    color: #f5f2ec;
    border: none;
    border-radius: 4px;
    font-size: 13px;
    cursor: pointer;
    margin-bottom: 16px;
    letter-spacing: 1px;
  }
  .detail-load-btn:hover { background: #444; }
  .detail-sections h3 { font-size: 14px; color: #1f1f1f; margin: 16px 0 6px; border-bottom: 1px solid #e0dbd0; padding-bottom: 4px; }
  .detail-sections p  { margin: 0 0 12px; }

  footer {
    padding: 12px 28px 28px;
    font-size: 12px;
    color: #777;
    background: #ece7db;
  }
</style>

    // ── 北韓 ────────────────────────────────────────────────────
    { id:"nk-002", region:"nk", start:1948, end:1994, cat:"politics", weight:5, title:"金日成執政（北韓建國）", descBrief:"1948 年建立朝鮮民主主義人民共和國，推行主體思想，執政至 1994 年逝世。", hasDetail:false, relatedIds:["sk-009","sk-010"], visible:true, tags:["金日成","北韓建國","主體思想"], sources:[] },

    { id:"nk-006", region:"nk", start:2011, end:2026, cat:"politics", weight:4, title:"金正恩執政",             descBrief:"2011 年接任，大幅加速核武與 ICBM 開發，多次核試引發國際制裁。",         hasDetail:false, relatedIds:[],               visible:true, tags:["金正恩","核武","ICBM"],      sources:[] }
  ]
};
</script>

<script>
// ═══════════════════════════════════════════════════════════════
//  常數
// ═══════════════════════════════════════════════════════════════
const PX_PER_YEAR  = 14;
const ROW_HEIGHT   = 30;   // px：每一事件列的高度
const LANE_PAD_TOP = 8;    // px：lane 頂部留白
const LANE_PAD_BOT = 8;    // px：lane 底部留白
const AXIS_HEIGHT  = 60;   // px
const LABEL_WIDTH  = 130;  // px：左側國家標籤寬度
const LABEL_PAD    = 10;   // px：timeline 右側多留白

const START_YEAR = Math.min(
  EVENTS_DATA.meta.startYear,
  ...EVENTS_DATA.events.map(e => e.start)
);
const END_YEAR = EVENTS_DATA.meta.endYear;

function yearToX(y) {
  return (y - START_YEAR) * PX_PER_YEAR;
}

// ═══════════════════════════════════════════════════════════════
//  工具：自動分配 row（貪婪區間排程）
// ═══════════════════════════════════════════════════════════════
function assignRows(events) {
  // 先依 start 排序，start 相同則 end 較大的先排（讓長事件佔較低 row）
  const sorted = [...events].sort((a, b) =>
    a.start !== b.start ? a.start - b.start : b.end - a.end
  );
  const rowEnds = []; // rowEnds[i] = 該 row 目前最後一個事件的 end year
  return sorted.map(ev => {
    const trackEnd = Math.max(ev.end, ev.start + 1); // 單點事件至少佔 1 年
    let r = rowEnds.findIndex(e => e <= ev.start);
    if (r === -1) r = rowEnds.length;
    rowEnds[r] = trackEnd;
    return { ...ev, _row: r };
  });
}

// ═══════════════════════════════════════════════════════════════
//  建立圖例
// ═══════════════════════════════════════════════════════════════
function buildLegend() {
  const el = document.getElementById('legend');
  EVENTS_DATA.categories.forEach(cat => {
    const item = document.createElement('div');
    item.className = 'legend-item';
    item.innerHTML = `<span class="swatch" style="background:${cat.color}"></span>${cat.label}`;
    el.appendChild(item);
  });
}

// ═══════════════════════════════════════════════════════════════
//  注入事件類別顏色 CSS
// ═══════════════════════════════════════════════════════════════
function injectCategoryStyles() {
  const css = EVENTS_DATA.categories
    .map(cat => `.cat-${cat.id} { background: ${cat.color}; }`)
    .join('\n');
  const style = document.createElement('style');
  style.textContent = css;
  document.head.appendChild(style);
}

// ═══════════════════════════════════════════════════════════════
//  建立刻度軸
// ═══════════════════════════════════════════════════════════════
function buildAxis(container) {
  const axis = document.createElement('div');
  axis.className = 'axis';
  for (let y = START_YEAR; y <= END_YEAR; y += 5) {
    const isMajor = y % 10 === 0;
    const tick = document.createElement('div');
    tick.className = 'tick ' + (isMajor ? 'major' : 'minor');
    tick.style.left = yearToX(y) + 'px';
    axis.appendChild(tick);
    if (isMajor) {
      const label = document.createElement('div');
      label.className = 'tick-label';
      label.style.left = yearToX(y) + 'px';
      label.textContent = y;
      axis.appendChild(label);
    }
  }
  container.appendChild(axis);
}

// ═══════════════════════════════════════════════════════════════
//  在 lane 加格線
// ═══════════════════════════════════════════════════════════════
function addGridlines(lane) {
  for (let y = START_YEAR; y <= END_YEAR; y += 5) {
    const g = document.createElement('div');
    g.className = 'gridline' + (y % 10 === 0 ? ' major' : '');
    g.style.left = yearToX(y) + 'px';
    lane.appendChild(g);
  }
}

// ═══════════════════════════════════════════════════════════════
//  渲染單一事件
// ═══════════════════════════════════════════════════════════════
function renderEvent(lane, ev) {
  const clampStart = Math.max(ev.start, START_YEAR);
  const clampEnd   = Math.max(ev.end,   START_YEAR);
  const spanYears  = Math.max(clampEnd - clampStart, 1);

  const el = document.createElement('div');
  el.className = 'event cat-' + ev.cat;
  el.style.left  = yearToX(clampStart) + 'px';
  el.style.width = (spanYears * PX_PER_YEAR) + 'px';
  el.style.top   = (LANE_PAD_TOP + ev._row * ROW_HEIGHT) + 'px';

  // 事件文字
  const text = document.createElement('span');
  text.className = 'event-text';
  text.textContent = ev.title;
  el.appendChild(text);

  // Tooltip（hover 顯示 descBrief）
  const tip = document.createElement('div');
  tip.className = 'tooltip';
  const range = ev.start === ev.end ? `${ev.start}` : `${ev.start} – ${ev.end}`;
  tip.innerHTML = `
    <div class="tooltip-title">${ev.title}</div>
    <div class="tooltip-range">${range}</div>
    <div class="tooltip-desc">${ev.descBrief}</div>
  `;
  el.appendChild(tip);

  // 點擊開詳情面板
  el.addEventListener('click', () => openPanel(ev));

  lane.appendChild(el);
}

// ═══════════════════════════════════════════════════════════════
//  右側詳情面板
// ═══════════════════════════════════════════════════════════════
const panel      = document.getElementById('detailPanel');
const panelTitle = document.getElementById('panelTitle');
const panelRange = document.getElementById('panelRange');
const panelBody  = document.getElementById('panelBody');

document.getElementById('panelClose').addEventListener('click', () => {
  panel.classList.remove('open');
});

function openPanel(ev) {
  const range = ev.start === ev.end ? `${ev.start}` : `${ev.start} – ${ev.end}`;
  panelTitle.textContent = ev.title;
  panelRange.textContent = range;

  panelBody.innerHTML = `
    <div class="detail-brief">${ev.descBrief}</div>
    ${ev.hasDetail
      ? `<button class="detail-load-btn" id="loadDetailBtn">▼ 閱讀詳細內容</button>`
      : ''}
    <div class="detail-sections" id="detailSections"></div>
  `;

  if (ev.hasDetail) {
    document.getElementById('loadDetailBtn').addEventListener('click', () => {
      loadDetail(ev.id);
    });
  }

  panel.classList.add('open');
}

function loadDetail(eventId) {
  const btn = document.getElementById('loadDetailBtn');
  const sections = document.getElementById('detailSections');
  if (btn) btn.disabled = true;
  if (btn) btn.textContent = '載入中…';

  fetch(`data/details/${eventId}.json`)
    .then(r => {
      if (!r.ok) throw new Error('無法載入');
      return r.json();
    })
    .then(data => {
      if (btn) btn.remove();
      sections.innerHTML = data.sections
        .map(s => `<h3>${s.title}</h3><p>${s.content}</p>`)
        .join('');
    })
    .catch(() => {
      if (btn) btn.textContent = '⚠ 載入失敗（需透過本地伺服器開啟）';
      if (btn) btn.disabled = false;
    });
}

// ═══════════════════════════════════════════════════════════════
//  主流程：建立時間軸
// ═══════════════════════════════════════════════════════════════
function buildTimeline() {
  const { regions, events } = EVENTS_DATA;
  const timeline = document.getElementById('timeline');

  // 設定 timeline 寬度
  const totalPx = yearToX(END_YEAR) + LABEL_PAD;
  timeline.style.width  = (LABEL_WIDTH + totalPx) + 'px';
  timeline.style.paddingLeft = LABEL_WIDTH + 'px';

  // 依 region 分組，只取 visible: true
  const byRegion = {};
  regions.forEach(r => { byRegion[r.id] = []; });
  events.filter(e => e.visible).forEach(e => {
    if (byRegion[e.region] !== undefined) byRegion[e.region].push(e);
  });

  // 自動分配 row，計算 lane 高度
  const assigned = {};
  const laneH    = {};
  regions.forEach(r => {
    assigned[r.id] = assignRows(byRegion[r.id]);
    const maxRow = assigned[r.id].length > 0
      ? Math.max(...assigned[r.id].map(e => e._row))
      : 0;
    laneH[r.id] = LANE_PAD_TOP + (maxRow + 1) * ROW_HEIGHT + LANE_PAD_BOT;
  });

  // 建立刻度軸
  buildAxis(timeline);

  // 建立各 region 的 label + lane
  let currentTop = AXIS_HEIGHT;
  regions.forEach(r => {
    const h = laneH[r.id];

    // 國家標籤
    const label = document.createElement('div');
    label.className = 'country-label';
    label.style.top        = currentTop + 'px';
    label.style.height     = h + 'px';
    label.style.background = r.color;
    label.textContent = r.label;
    timeline.appendChild(label);

    // Lane
    const lane = document.createElement('div');
    lane.className = 'lane';
    lane.id = 'lane-' + r.id;
    lane.style.height = h + 'px';

    // 各 region 特殊樣式
    if (r.id === 'kr') {
      lane.classList.add('lane-kr');
      // 1948 後斜線底紋
      const ended = document.createElement('div');
      ended.className = 'kr-ended';
      ended.style.left  = yearToX(1948) + 'px';
      ended.style.right = '0';
      lane.appendChild(ended);
      // 分裂標記線
      const marker = document.createElement('div');
      marker.className = 'split-marker';
      marker.style.left = yearToX(1948) + 'px';
      const splitLbl = document.createElement('span');
      splitLbl.className = 'split-label';
      splitLbl.textContent = '1948 南北分裂';
      marker.appendChild(splitLbl);
      lane.appendChild(marker);
    } else if (r.id === 'sk') {
      lane.classList.add('lane-sk');
    } else if (r.id === 'nk') {
      lane.classList.add('lane-nk');
    }

    addGridlines(lane);
    assigned[r.id].forEach(ev => renderEvent(lane, ev));
    timeline.appendChild(lane);

    currentTop += h;
  });

  // timeline 總高度
  timeline.style.height = currentTop + 'px';
}

// ═══════════════════════════════════════════════════════════════
//  啟動
// ═══════════════════════════════════════════════════════════════
injectCategoryStyles();
buildLegend();
buildTimeline();
</script>

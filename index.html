<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>歷史線 (1895–2026)</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "PingFang TC", "Microsoft JhengHei", "Noto Sans TC", sans-serif;
    background: #f5f2ec;
    color: #2b2b2b;
  }
  header {
    padding: 18px 28px 10px;
    background: #1f1f1f;
    color: #f5f2ec;
    border-bottom: 3px solid #c9a24a;
  }
  header h1 { margin: 0 0 4px; font-size: 22px; letter-spacing: 2px; }
  header p  { margin: 0; font-size: 13px; color: #cfcabd; }

  /* 圖例 */
  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 14px 22px;
    padding: 12px 28px;
    background: #ece7db;
    border-bottom: 1px solid #d7cfbd;
    font-size: 13px;
  }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .swatch { width: 16px; height: 12px; border-radius: 2px; border: 1px solid rgba(0,0,0,.15); }

  /* 時間軸容器 */
  .timeline-wrapper {
    overflow-x: auto;
    overflow-y: hidden;
    padding: 0 0 24px;
    background: #f5f2ec;
  }
  .timeline {
    position: relative;
    /* 寬度由 JS 動態設定 */
  }

  /* 國家標籤欄 */
  .country-label {
    position: absolute;
    left: 0;
    width: 130px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 3px;
    color: #f5f2ec;
    border-right: 3px solid #c9a24a;
    z-index: 3;
    /* top / height 由 JS 設定 */
  }

  /* 刻度軸 */
  .axis {
    position: relative;
    height: 60px;
    border-bottom: 2px solid #2b2b2b;
    margin-bottom: 0;
  }
  .tick { position: absolute; bottom: 0; width: 1px; background: #888; }
  .tick.minor { height: 8px; background: #b7b1a2; }
  .tick.major { height: 22px; width: 2px; background: #2b2b2b; }
  .tick-label {
    position: absolute;
    bottom: 26px;
    transform: translateX(-50%);
    font-size: 12px;
    font-weight: 700;
    color: #2b2b2b;
    white-space: nowrap;
  }

  /* 通道 */
  .lane {
    position: relative;
    border-bottom: 1px solid #c4bda9;
    /* height 由 JS 動態設定 */
  }
  .lane .gridline {
    position: absolute;
    top: 0; bottom: 0;
    width: 1px;
    background: rgba(180,170,145,.35);
  }
  .lane .gridline.major { background: rgba(80,70,50,.25); }

  /* 朝鮮半島通道：1948 後加底紋表示結束 */
  .lane-kr {
    border-left: 4px solid rgba(122,106,58,0.4);
  }
  .lane-kr .kr-ended {
    position: absolute;
    top: 0; bottom: 0;
    background: repeating-linear-gradient(
      135deg,
      rgba(180,170,145,.12) 0px,
      rgba(180,170,145,.12) 4px,
      transparent 4px,
      transparent 10px
    );
    border-left: 2px dashed rgba(122,106,58,0.4);
    z-index: 0;
  }
  .split-marker {
    position: absolute;
    top: 0; bottom: 0;
    width: 2px;
    background: rgba(122,106,58,0.6);
    z-index: 2;
  }
  .split-label {
    position: absolute;
    top: 4px;
    left: 4px;
    font-size: 10px;
    color: rgba(100,85,40,0.85);
    white-space: nowrap;
    font-weight: 600;
    letter-spacing: 0.5px;
  }

  /* 南韓 / 北韓通道 */
  .lane-sk { border-left: 4px solid rgba(26,74,138,0.35); border-bottom: 2px dashed rgba(120,80,80,.4); }
  .lane-nk { border-left: 4px solid rgba(139,26,26,0.35); }

  /* 事件條 */
  .event {
    position: absolute;
    height: 26px;
    border-radius: 4px;
    padding: 3px 6px;
    color: #fff;
    font-size: 12px;
    line-height: 20px;
    overflow: visible;
    min-width: 28px;
    cursor: pointer;
    box-shadow: 0 1px 2px rgba(0,0,0,.12);
    border: 1px solid rgba(0,0,0,.15);
    transition: transform .12s, box-shadow .12s;
    z-index: 1;
  }
  .event:hover {
    transform: translateY(-1px);
    box-shadow: 0 4px 10px rgba(0,0,0,.22);
    z-index: 10;
  }
  .event-text {
    display: block;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    line-height: 20px;
  }

  /* Tooltip（hover 顯示 descBrief） */
  .tooltip {
    display: none;
    position: absolute;
    left: 0;
    top: 32px;
    background: #1f1f1f;
    color: #f5f2ec;
    padding: 8px 12px;
    border-radius: 4px;
    font-size: 12px;
    line-height: 1.6;
    white-space: normal;
    width: 280px;
    z-index: 20;
    box-shadow: 0 6px 16px rgba(0,0,0,.3);
    pointer-events: none;
  }
  .event:hover .tooltip { display: block; }
  .tooltip-title { font-weight: 700; font-size: 13px; margin-bottom: 2px; }
  .tooltip-range { color: #c9a24a; font-size: 11px; margin-bottom: 5px; }
  .tooltip-desc  { color: #e0dbd0; }

  /* 事件類別顏色 — 由 JS 動態注入 <style> */

  /* 右側詳情面板（Phase 3 預留骨架） */
  .detail-panel {
    position: fixed;
    top: 0; right: -400px;
    width: 380px;
    height: 100vh;
    background: #fff;
    box-shadow: -4px 0 20px rgba(0,0,0,.15);
    z-index: 100;
    transition: right .25s ease;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .detail-panel.open { right: 0; }
  .detail-panel-header {
    padding: 20px 20px 14px;
    background: #1f1f1f;
    color: #f5f2ec;
    flex-shrink: 0;
  }
  .detail-panel-header h2 { margin: 0 0 4px; font-size: 16px; line-height: 1.4; }
  .detail-panel-range { color: #c9a24a; font-size: 12px; }
  .detail-panel-close {
    position: absolute;
    top: 16px; right: 16px;
    background: none;
    border: none;
    color: #f5f2ec;
    font-size: 20px;
    cursor: pointer;
    line-height: 1;
    padding: 4px;
  }
  .detail-panel-body {
    padding: 20px;
    overflow-y: auto;
    flex: 1;
    font-size: 14px;
    line-height: 1.7;
    color: #333;
  }
  .detail-brief {
    background: #f5f2ec;
    border-left: 3px solid #c9a24a;
    padding: 10px 14px;
    margin-bottom: 16px;
    font-size: 13px;
    color: #555;
    border-radius: 0 4px 4px 0;
  }
  .detail-sections h3 { font-size: 14px; color: #1f1f1f; margin: 16px 0 6px; border-bottom: 1px solid #e0dbd0; padding-bottom: 4px; }
  .detail-sections p  { margin: 0 0 12px; }

  /* 縮放控制列 */
  .zoom-bar {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 0;
    background: #1f1f1f;
    border-radius: 8px;
    box-shadow: 0 4px 16px rgba(0,0,0,.3);
    z-index: 50;
    overflow: hidden;
  }
  .zoom-btn {
    background: none;
    border: none;
    color: #f5f2ec;
    font-size: 20px;
    width: 40px;
    height: 40px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background .15s;
    flex-shrink: 0;
  }
  .zoom-btn:hover  { background: rgba(255,255,255,.12); }
  .zoom-btn:active { background: rgba(255,255,255,.22); }
  .zoom-btn:disabled { opacity: .3; cursor: default; }
  .zoom-pips {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 0 10px;
    border-left: 1px solid rgba(255,255,255,.12);
    border-right: 1px solid rgba(255,255,255,.12);
  }
  .zoom-pip {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: rgba(255,255,255,.3);
    cursor: pointer;
    transition: background .15s, transform .15s;
  }
  .zoom-pip.active {
    background: #c9a24a;
    transform: scale(1.3);
  }
  .zoom-label {
    color: #c9a24a;
    font-size: 12px;
    font-weight: 700;
    min-width: 32px;
    text-align: center;
    padding: 0 6px;
  }

  footer {
    padding: 12px 28px 28px;
    font-size: 12px;
    color: #777;
    background: #ece7db;
  }
</style>
</head>
<body>

<header>
  <h1>歷史線</h1>
  <p>1895 年 — 2026 年 · 由左至右 · 大刻度每 10 年，小刻度每 5 年</p>
</header>

<div class="legend" id="legend"></div>

<div class="timeline-wrapper">
  <div class="timeline" id="timeline"></div>
</div>

<!-- 右側詳情面板 -->
<div class="detail-panel" id="detailPanel">
  <div class="detail-panel-header">
    <h2 id="panelTitle"></h2>
    <div class="detail-panel-range" id="panelRange"></div>
    <button class="detail-panel-close" id="panelClose">✕</button>
  </div>
  <div class="detail-panel-body" id="panelBody"></div>
</div>

<footer>
  滑鼠移至事件條可看摘要；點擊可開啟詳情面板。Ctrl＋滾輪或觸控板縮放可縮放時間軸。
  <strong>朝鮮半島</strong>通道顯示 1948 年分裂前的整體史，斜線區為分裂後。
</footer>

<!-- 縮放控制列 -->
<div class="zoom-bar" id="zoomBar">
  <button class="zoom-btn" id="zoomOut" title="縮小">－</button>
  <div class="zoom-pips" id="zoomPips"></div>
  <span class="zoom-label" id="zoomLabel">1×</span>
  <button class="zoom-btn" id="zoomIn" title="放大">＋</button>
</div>

<script src="data/events-data.js"></script>


<script>
// ═══════════════════════════════════════════════════════════════
//  縮放層級定義
// ═══════════════════════════════════════════════════════════════
const ZOOM_LEVELS = [
  { pxPerYear: 3.5, major: 50, minor: 25, minWeight: 5, label: '¼×' },
  { pxPerYear: 7,   major: 20, minor: 10, minWeight: 4, label: '½×' },
  { pxPerYear: 14,  major: 10, minor: 5,  minWeight: 3, label: '1×'  },
  { pxPerYear: 28,  major: 5,  minor: 1,  minWeight: 2, label: '2×'  },
  { pxPerYear: 56,  major: 2,  minor: 1,  minWeight: 1, label: '4×'  },
];
let currentZoom   = 2;   // 預設 1×
let currentPxPerYear = ZOOM_LEVELS[currentZoom].pxPerYear;

// ═══════════════════════════════════════════════════════════════
//  常數
// ═══════════════════════════════════════════════════════════════
const ROW_HEIGHT   = 30;
const LANE_PAD_TOP = 8;
const LANE_PAD_BOT = 8;
const AXIS_HEIGHT  = 60;
const LABEL_WIDTH  = 130;
const LABEL_PAD    = 20;

const START_YEAR = Math.min(
  EVENTS_DATA.meta.startYear,
  ...EVENTS_DATA.events.map(e => e.start)
);
const END_YEAR = EVENTS_DATA.meta.endYear;

function yearToX(y) {
  return (y - START_YEAR) * currentPxPerYear;
}

// ═══════════════════════════════════════════════════════════════
//  工具：自動分配 row
// ═══════════════════════════════════════════════════════════════
function assignRows(events) {
  const sorted = [...events].sort((a, b) =>
    a.start !== b.start ? a.start - b.start : b.end - a.end
  );
  const rowEnds = [];
  return sorted.map(ev => {
    const trackEnd = Math.max(ev.end, ev.start + 1);
    let r = rowEnds.findIndex(e => e <= ev.start);
    if (r === -1) r = rowEnds.length;
    rowEnds[r] = trackEnd;
    return { ...ev, _row: r };
  });
}

// ═══════════════════════════════════════════════════════════════
//  注入事件類別顏色 CSS
// ═══════════════════════════════════════════════════════════════
function injectCategoryStyles() {
  const css = EVENTS_DATA.categories
    .map(cat => `.cat-${cat.id} { background: ${cat.color}; }`)
    .join('\n');
  const style = document.createElement('style');
  style.textContent = css;
  document.head.appendChild(style);
}

// ═══════════════════════════════════════════════════════════════
//  建立圖例
// ═══════════════════════════════════════════════════════════════
function buildLegend() {
  const el = document.getElementById('legend');
  EVENTS_DATA.categories.forEach(cat => {
    const item = document.createElement('div');
    item.className = 'legend-item';
    item.innerHTML = `<span class="swatch" style="background:${cat.color}"></span>${cat.label}`;
    el.appendChild(item);
  });
}

// ═══════════════════════════════════════════════════════════════
//  建立刻度軸（依縮放層級調整間隔）
// ═══════════════════════════════════════════════════════════════
function buildAxis(container, major, minor) {
  const axis = document.createElement('div');
  axis.className = 'axis';
  const firstTick = Math.ceil(START_YEAR / minor) * minor;
  for (let y = firstTick; y <= END_YEAR; y += minor) {
    const isMajor = y % major === 0;
    const tick = document.createElement('div');
    tick.className = 'tick ' + (isMajor ? 'major' : 'minor');
    tick.style.left = yearToX(y) + 'px';
    axis.appendChild(tick);
    if (isMajor) {
      const label = document.createElement('div');
      label.className = 'tick-label';
      label.style.left = yearToX(y) + 'px';
      label.textContent = y;
      axis.appendChild(label);
    }
  }
  container.appendChild(axis);
}

// ═══════════════════════════════════════════════════════════════
//  在 lane 加格線
// ═══════════════════════════════════════════════════════════════
function addGridlines(lane, major, minor) {
  const firstTick = Math.ceil(START_YEAR / minor) * minor;
  for (let y = firstTick; y <= END_YEAR; y += minor) {
    const g = document.createElement('div');
    g.className = 'gridline' + (y % major === 0 ? ' major' : '');
    g.style.left = yearToX(y) + 'px';
    lane.appendChild(g);
  }
}

// ═══════════════════════════════════════════════════════════════
//  渲染單一事件
// ═══════════════════════════════════════════════════════════════
function renderEvent(lane, ev) {
  const clampStart = Math.max(ev.start, START_YEAR);
  const clampEnd   = Math.max(ev.end,   START_YEAR);
  const spanYears  = Math.max(clampEnd - clampStart, 1);

  const el = document.createElement('div');
  el.className = 'event cat-' + ev.cat;
  el.style.left  = yearToX(clampStart) + 'px';
  el.style.width = (spanYears * currentPxPerYear) + 'px';
  el.style.top   = (LANE_PAD_TOP + ev._row * ROW_HEIGHT) + 'px';

  const text = document.createElement('span');
  text.className = 'event-text';
  text.textContent = ev.title;
  el.appendChild(text);

  const tip = document.createElement('div');
  tip.className = 'tooltip';
  const range = ev.start === ev.end ? `${ev.start}` : `${ev.start} – ${ev.end}`;
  tip.innerHTML = `
    <div class="tooltip-title">${ev.title}</div>
    <div class="tooltip-range">${range}</div>
    <div class="tooltip-desc">${ev.descBrief}</div>
  `;
  el.appendChild(tip);

  el.addEventListener('click', () => openPanel(ev));
  lane.appendChild(el);
}

// ═══════════════════════════════════════════════════════════════
//  右側詳情面板
// ═══════════════════════════════════════════════════════════════
const panel      = document.getElementById('detailPanel');
const panelTitle = document.getElementById('panelTitle');
const panelRange = document.getElementById('panelRange');
const panelBody  = document.getElementById('panelBody');

document.getElementById('panelClose').addEventListener('click', () => {
  panel.classList.remove('open');
});

function openPanel(ev) {
  const range = ev.start === ev.end ? `${ev.start}` : `${ev.start} – ${ev.end}`;
  panelTitle.textContent = ev.title;
  panelRange.textContent = range;
  if (ev.hasDetail) {
    panelBody.innerHTML = `<div class="detail-sections" id="detailSections"><p style="color:#aaa;font-size:13px">載入中…</p></div>`;
    loadDetail(ev.id);
  } else {
    panelBody.innerHTML = `<div class="detail-brief">${ev.descBrief}</div>`;
  }
  panel.classList.add('open');
}

function renderDetail(eventId) {
  const sections = document.getElementById('detailSections');
  if (!sections) return;
  const data = window.DETAILS_DATA?.[eventId];
  if (!data) {
    sections.innerHTML = '<p style="color:#c9a24a">⚠ 資料載入失敗</p>';
    return;
  }
  sections.innerHTML = data.sections.map(s => `<h3>${s.title}</h3><p>${s.content}</p>`).join('');
}

function loadDetail(eventId) {
  if (window.DETAILS_DATA?.[eventId]) { renderDetail(eventId); return; }
  const s = document.createElement('script');
  s.src = `data/details/${eventId}.js`;
  s.onload  = () => renderDetail(eventId);
  s.onerror = () => {
    const sections = document.getElementById('detailSections');
    if (sections) sections.innerHTML = '<p style="color:#c9a24a">⚠ 載入失敗</p>';
  };
  document.head.appendChild(s);
}

// ═══════════════════════════════════════════════════════════════
//  建立時間軸（可傳入 minWeight 過濾事件）
// ═══════════════════════════════════════════════════════════════
function buildTimeline(minWeight) {
  const { regions, events } = EVENTS_DATA;
  const zl = ZOOM_LEVELS[currentZoom];
  const timeline = document.getElementById('timeline');
  timeline.innerHTML = '';

  // 更新 header 說明
  document.querySelector('header p').textContent =
    `${START_YEAR} 年 — ${END_YEAR} 年 · 由左至右 · 大刻度每 ${zl.major} 年，小刻度每 ${zl.minor} 年`;

  // 設定 timeline 寬度
  timeline.style.width      = (LABEL_WIDTH + yearToX(END_YEAR) + LABEL_PAD) + 'px';
  timeline.style.paddingLeft = LABEL_WIDTH + 'px';

  // 依 region 分組，過濾 visible + weight
  const byRegion = {};
  regions.forEach(r => { byRegion[r.id] = []; });
  events
    .filter(e => e.visible && e.weight >= minWeight)
    .forEach(e => { if (byRegion[e.region] !== undefined) byRegion[e.region].push(e); });

  // 自動分配 row，計算 lane 高度
  const assigned = {};
  const laneH    = {};
  regions.forEach(r => {
    assigned[r.id] = assignRows(byRegion[r.id]);
    const maxRow = assigned[r.id].length > 0 ? Math.max(...assigned[r.id].map(e => e._row)) : 0;
    laneH[r.id] = LANE_PAD_TOP + (maxRow + 1) * ROW_HEIGHT + LANE_PAD_BOT;
  });

  // 建立刻度軸
  buildAxis(timeline, zl.major, zl.minor);

  // 建立各 region 的 label + lane
  let currentTop = AXIS_HEIGHT;
  regions.forEach(r => {
    const h = laneH[r.id];

    const label = document.createElement('div');
    label.className = 'country-label';
    label.style.top        = currentTop + 'px';
    label.style.height     = h + 'px';
    label.style.background = r.color;
    label.textContent      = r.label;
    timeline.appendChild(label);

    const lane = document.createElement('div');
    lane.className = 'lane';
    lane.id = 'lane-' + r.id;
    lane.style.height = h + 'px';

    if (r.id === 'kr') {
      lane.classList.add('lane-kr');
      const ended = document.createElement('div');
      ended.className = 'kr-ended';
      ended.style.left  = yearToX(1948) + 'px';
      ended.style.right = '0';
      lane.appendChild(ended);
      const marker = document.createElement('div');
      marker.className = 'split-marker';
      marker.style.left = yearToX(1948) + 'px';
      const splitLbl = document.createElement('span');
      splitLbl.className = 'split-label';
      splitLbl.textContent = '1948 南北分裂';
      marker.appendChild(splitLbl);
      lane.appendChild(marker);
    } else if (r.id === 'sk') {
      lane.classList.add('lane-sk');
    } else if (r.id === 'nk') {
      lane.classList.add('lane-nk');
    }

    addGridlines(lane, zl.major, zl.minor);
    assigned[r.id].forEach(ev => renderEvent(lane, ev));
    timeline.appendChild(lane);
    currentTop += h;
  });

  timeline.style.height = currentTop + 'px';
}

// ═══════════════════════════════════════════════════════════════
//  縮放核心：保持 pivotX 對應的年份不動
// ═══════════════════════════════════════════════════════════════
const wrapper = document.querySelector('.timeline-wrapper');

function applyZoom(newZoomIdx, pivotScreenX) {
  if (newZoomIdx < 0 || newZoomIdx >= ZOOM_LEVELS.length) return;

  // 記住 pivot 對應的年份
  const scrollLeft = wrapper.scrollLeft;
  const yearAtPivot = (scrollLeft + pivotScreenX - LABEL_WIDTH) / currentPxPerYear + START_YEAR;

  // 切換縮放
  currentZoom      = newZoomIdx;
  currentPxPerYear = ZOOM_LEVELS[newZoomIdx].pxPerYear;

  // 重新渲染
  buildTimeline(ZOOM_LEVELS[currentZoom].minWeight);

  // 還原 scroll，讓 yearAtPivot 維持在 pivotScreenX 位置
  const newScrollLeft = (yearAtPivot - START_YEAR) * currentPxPerYear + LABEL_WIDTH - pivotScreenX;
  wrapper.scrollLeft = Math.max(0, newScrollLeft);

  updateZoomUI();
}

// ═══════════════════════════════════════════════════════════════
//  縮放 UI 更新
// ═══════════════════════════════════════════════════════════════
function updateZoomUI() {
  document.getElementById('zoomLabel').textContent = ZOOM_LEVELS[currentZoom].label;
  document.getElementById('zoomIn').disabled  = currentZoom >= ZOOM_LEVELS.length - 1;
  document.getElementById('zoomOut').disabled = currentZoom <= 0;

  // 更新小圓點
  document.querySelectorAll('.zoom-pip').forEach((pip, i) => {
    pip.classList.toggle('active', i === currentZoom);
  });
}

function initZoomUI() {
  const pips = document.getElementById('zoomPips');
  ZOOM_LEVELS.forEach((_, i) => {
    const pip = document.createElement('div');
    pip.className = 'zoom-pip' + (i === currentZoom ? ' active' : '');
    pip.title = ZOOM_LEVELS[i].label;
    pip.addEventListener('click', () => {
      const rect = wrapper.getBoundingClientRect();
      applyZoom(i, rect.width / 2);
    });
    pips.appendChild(pip);
  });

  // 按鈕
  document.getElementById('zoomIn').addEventListener('click', () => {
    const rect = wrapper.getBoundingClientRect();
    applyZoom(currentZoom + 1, rect.width / 2);
  });
  document.getElementById('zoomOut').addEventListener('click', () => {
    const rect = wrapper.getBoundingClientRect();
    applyZoom(currentZoom - 1, rect.width / 2);
  });

  updateZoomUI();
}

// ═══════════════════════════════════════════════════════════════
//  滾輪 / Pinch 縮放（Ctrl + 滾輪 或 觸控板 Pinch）
// ═══════════════════════════════════════════════════════════════
// PINCH_THRESHOLD：累積多少 deltaY 才跳一個層級，數字越大越不靈敏
const PINCH_THRESHOLD = 30;
let pinchAccum = 0;

wrapper.addEventListener('wheel', (e) => {
  if (!e.ctrlKey) return; // 無 Ctrl → 正常橫向捲動
  e.preventDefault();

  pinchAccum += e.deltaY;

  if (Math.abs(pinchAccum) >= PINCH_THRESHOLD) {
    const rect = wrapper.getBoundingClientRect();
    const mouseX = e.clientX - rect.left;
    applyZoom(pinchAccum < 0 ? currentZoom + 1 : currentZoom - 1, mouseX);
    pinchAccum = 0; // 跳完一級後重新累積
  }
}, { passive: false });

// ═══════════════════════════════════════════════════════════════
//  啟動
// ═══════════════════════════════════════════════════════════════
injectCategoryStyles();
buildLegend();
buildTimeline(ZOOM_LEVELS[currentZoom].minWeight);
initZoomUI();
</script>
</body>
</html>
